<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoShop - Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* =========================================================
       RESET & BASE STYLES
       ========================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #FAF7F2;
      color: #3B2A1A;
      line-height: 1.5;
      padding-bottom: 60px;
    }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: none;
    }

    input {
      font-family: inherit;
      outline: none;
    }

    /* =========================================================
       TYPOGRAPHY
       ========================================================= */
    .title-font {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
    }

    /* =========================================================
       LAYOUT
       ========================================================= */
    .checkout-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px;
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      color: #7A6550;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }
    .breadcrumb__icon {
      color: #3B2A1A;
      margin-right: 8px;
    }
    .breadcrumb__link {
      color: #7A6550;
      text-decoration: none;
      transition: color 0.2s;
    }
    .breadcrumb__link:hover { color: #3B2A1A; }
    .breadcrumb__current { color: #3B2A1A; }

    /* Header */
    .header {
      margin-bottom: 40px;
    }
    .header__title {
      font-size: 56px;
      color: #3B2A1A;
      line-height: 1;
      margin-bottom: 8px;
    }
    .header__subtitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: #3B2A1A;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 1px;
    }
    .header__subtitle-icon {
      font-weight: 700;
    }

    /* Grid Layout */
    .checkout-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 32px;
      align-items: start;
    }

    /* =========================================================
       CART ITEMS (LEFT COLUMN)
       ========================================================= */
    .cart-wrapper {
      background-color: #423223;
      border-radius: 24px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cart-item {
      background-color: #FAF7F2;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      gap: 20px;
      align-items: stretch;
    }
    
    .cart-item__image-wrap {
      width: 120px;
      height: 120px;
      background-color: #E8DDD0;
      border-radius: 12px;
      flex-shrink: 0;
      overflow: hidden;
    }
    
    .cart-item__image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-item__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .cart-item__details {
      margin-bottom: 12px;
    }

    .cart-item__name {
      font-size: 28px;
      color: #3B2A1A;
      line-height: 1;
      margin-bottom: 4px;
    }

    .cart-item__meta {
      font-size: 12px;
      color: #3B2A1A;
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .cart-item__price {
      font-size: 20px;
      color: #3B2A1A;
    }

    .cart-item__actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .qty-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #FFFFFF;
      border: 1px solid #D8D0C4;
      border-radius: 50px;
      padding: 4px 12px;
    }

    .qty-selector__btn {
      color: #555;
      font-size: 18px;
      font-weight: 500;
      width: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }
    .qty-selector__btn:hover { color: #3B2A1A; }

    .qty-selector__value {
      font-size: 14px;
      font-weight: 700;
      color: #3B2A1A;
      min-width: 16px;
      text-align: center;
    }

    .cart-item__delete {
      background-color: #D9534F;
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background-color 0.2s;
    }
    .cart-item__delete:hover { background-color: #c9302c; }

    /* =========================================================
       SUMMARY & PAYMENT (RIGHT COLUMN)
       ========================================================= */
    .summary-wrapper {
      background-color: #FAF7F2;
      border: 3px solid #3B2A1A;
      border-radius: 24px;
      padding: 32px;
    }

    .summary-table {
      width: 100%;
      margin-bottom: 24px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 20px;
      color: #3B2A1A;
    }

    .summary-row--discount {
      color: #4CAF50;
    }
    
    .discount-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #4CAF50;
      color: white;
      border-radius: 4px;
      font-size: 14px;
      padding: 2px 6px;
      margin-left: 8px;
    }

    .summary-divider {
      height: 2px;
      background-color: #3B2A1A;
      margin: 16px 0;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 28px;
      color: #3B2A1A;
      margin-bottom: 32px;
    }

    /* Payment Information */
    .payment-title {
      font-size: 14px;
      font-weight: 700;
      color: #3B2A1A;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .payment-methods {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .payment-method {
      border: 2px solid #D8D0C4;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
      background: #FFFFFF;
    }

    .payment-method.is-active {
      border-color: #4CAF50;
      background-color: #F0F9EE;
    }

    .payment-method__icon { color: #3B2A1A; }
    .payment-method__name { font-size: 12px; font-weight: 700; color: #3B2A1A; }
    .payment-method__sub { font-size: 10px; color: #7A6550; }
    .payment-method__check {
      position: absolute;
      top: 12px;
      right: 12px;
      color: #4CAF50;
      display: none;
    }
    .payment-method.is-active .payment-method__check { display: block; }

    /* Form Fields */
    .form-group {
      margin-bottom: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #3B2A1A;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input-wrap {
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #D8D0C4;
      border-radius: 8px;
      font-size: 14px;
      background-color: #FFFFFF;
      color: #3B2A1A;
      transition: border-color 0.2s;
    }
    
    .form-input:focus {
      border-color: #3B2A1A;
    }
    
    .form-input::placeholder {
      color: #A08878;
    }

    .form-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #A08878;
    }

    .checkout-btn {
      width: 100%;
      background-color: #5CB85C;
      color: #FFFFFF;
      padding: 16px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      transition: background-color 0.2s;
    }
    .checkout-btn:hover { background-color: #4cae4c; }
    .checkout-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    /* Trust Icons */
    .trust-badges {
      display: flex;
      justify-content: space-around;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #D8D0C4;
    }

    .trust-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #A08878;
    }

    .trust-badge__label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* =========================================================
       RESPONSIVE
       ========================================================= */
    @media screen and (max-width: 1024px) {
      .checkout-grid { grid-template-columns: 1fr; }
      .checkout-container { padding: 24px; }
      .cart-wrapper, .summary-wrapper { padding: 20px; }
    }

    @media screen and (max-width: 600px) {
      .header__title { font-size: 42px; }
      .cart-item { flex-direction: column; }
      .cart-item__image-wrap { width: 100%; height: 200px; }
      .form-row { grid-template-columns: 1fr; }
      .payment-methods { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <main class="checkout-container">
    
    <nav class="breadcrumb">
      <svg class="breadcrumb__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      <a href="#" class="breadcrumb__link">ECOSHOP</a> /
      <a href="#" class="breadcrumb__link">CATALOG</a> /
      <a href="#" class="breadcrumb__link">NAMA PRODUK</a> /
      <span class="breadcrumb__current">CHECKOUT</span>
    </nav>

    <header class="header">
      <h1 class="header__title title-font">CHECKOUT</h1>
      <p class="header__subtitle">
        <span class="header__subtitle-icon">!</span> ALWAYS RECHECK YOUR ORDERS BEFORE PAYING
      </p>
    </header>

    <div class="checkout-grid">
      
      <section class="cart-wrapper" id="cart-container">
        </section>

      <aside class="summary-wrapper">
        
        <div class="summary-table">
          <div class="summary-row title-font">
            <span>SUBTOTAL</span>
            <span id="summ-subtotal">RP. 0</span>
          </div>
          <div class="summary-row title-font">
            <span>SHIPPING COST</span>
            <span id="summ-shipping">RP. 15.000</span>
          </div>
          <div class="summary-row summary-row--discount title-font">
            <span>DISCOUNT <span class="discount-badge">🎫</span></span>
            <span id="summ-discount">RP. 0</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-total title-font">
            <span>TOTAL</span>
            <span id="summ-total">RP. 0</span>
          </div>
        </div>

        <h3 class="payment-title">PAYMENT INFORMATION</h3>

        <div class="payment-methods">
          <div class="payment-method is-active" data-method="card">
            <svg class="payment-method__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
            <span class="payment-method__name">Credit Card</span>
            <svg class="payment-method__check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="payment-method" data-method="digital">
            <svg class="payment-method__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
            <div>
              <span class="payment-method__name" style="display:block;">Digital Wallet</span>
              <span class="payment-method__sub">Apple Pay, Google Pay</span>
            </div>
            <svg class="payment-method__check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
        </div>

        <form id="payment-form">
          <div class="form-group">
            <label class="form-label" for="card-name">CARDHOLDER NAME</label>
            <input class="form-input" type="text" id="card-name" placeholder="Julian Thorne" required>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="card-number">CARD NUMBER</label>
            <div class="form-input-wrap">
              <input class="form-input" type="text" id="card-number" placeholder="5547 8890 7600 6620" maxlength="19" required>
              <svg class="form-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="card-expiry">EXPIRY DATE</label>
              <input class="form-input" type="text" id="card-expiry" placeholder="MM / YY" maxlength="7" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="card-cvv">CVC / CVV</label>
              <input class="form-input" type="password" id="card-cvv" placeholder="***" maxlength="3" required>
            </div>
          </div>

          <button type="button" class="checkout-btn" id="btn-checkout">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M12 8v4l3 3"></path></svg> Check Out
          </button>
        </form>

        <div class="trust-badges">
          <div class="trust-badge">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <span class="trust-badge__label">SECURE PAY</span>
          </div>
          <div class="trust-badge">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <span class="trust-badge__label">CARBON NEUTRAL</span>
          </div>
          <div class="trust-badge">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.28l5.67-5.67"></path></svg>
            <span class="trust-badge__label">EASY RETURNS</span>
          </div>
        </div>

      </aside>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Configuration
      const SHIPPING_COST = 15000;
      const DISCOUNT_RATE = 0.10; // 10% discount

      // Initial Cart Data (matching the 4 items from the design)
      let cartItems = [
        { id: 1, name: 'PRODUCT NAME', desc: 'PREORDER DAYS', price: 45000, qty: 1, img: 'https://images.unsplash.com/photo-1607006411204-62986420d418?w=200&q=80' },
        { id: 2, name: 'PRODUCT NAME', desc: 'PREORDER DAYS', price: 45000, qty: 1, img: 'https://images.unsplash.com/photo-1607006411204-62986420d418?w=200&q=80' },
        { id: 3, name: 'PRODUCT NAME', desc: 'PREORDER DAYS', price: 45000, qty: 1, img: 'https://images.unsplash.com/photo-1607006411204-62986420d418?w=200&q=80' },
        { id: 4, name: 'PRODUCT NAME', desc: 'PREORDER DAYS', price: 45000, qty: 1, img: 'https://images.unsplash.com/photo-1607006411204-62986420d418?w=200&q=80' }
      ];

      const cartContainer = document.getElementById('cart-container');
      
      // Formatting utility
      const formatCurrency = (num) => {
        return 'RP. ' + num.toLocaleString('id-ID').replace(/,/g, '.');
      };

      // Render Cart
      const renderCart = () => {
        if (cartItems.length === 0) {
          cartContainer.innerHTML = '<div style="color: #FAF7F2; text-align: center; padding: 40px;">Your cart is empty.</div>';
          updateTotals();
          return;
        }

        cartContainer.innerHTML = cartItems.map((item, index) => `
          <div class="cart-item">
            <div class="cart-item__image-wrap">
              <img src="${item.img}" alt="Product Image" class="cart-item__image">
            </div>
            <div class="cart-item__content">
              <div class="cart-item__details">
                <h3 class="cart-item__name title-font">${item.name}</h3>
                <p class="cart-item__meta">${item.desc}</p>
                <p class="cart-item__price title-font">${formatCurrency(item.price)}</p>
              </div>
              <div class="cart-item__actions">
                <div class="qty-selector">
                  <button class="qty-selector__btn btn-dec" data-id="${item.id}">-</button>
                  <span class="qty-selector__value">${item.qty}</span>
                  <button class="qty-selector__btn btn-inc" data-id="${item.id}">+</button>
                </div>
                <button class="cart-item__delete btn-del" data-id="${item.id}">DELETE 🗑</button>
              </div>
            </div>
          </div>
        `).join('');

        attachCartListeners();
        updateTotals();
      };

      // Handle Events for Cart Items
      const attachCartListeners = () => {
        document.querySelectorAll('.btn-inc').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = parseInt(e.currentTarget.dataset.id);
            const item = cartItems.find(i => i.id === id);
            if (item) item.qty++;
            renderCart();
          });
        });

        document.querySelectorAll('.btn-dec').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = parseInt(e.currentTarget.dataset.id);
            const item = cartItems.find(i => i.id === id);
            if (item && item.qty > 1) item.qty--;
            renderCart();
          });
        });

        document.querySelectorAll('.btn-del').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = parseInt(e.currentTarget.dataset.id);
            cartItems = cartItems.filter(i => i.id !== id);
            renderCart();
          });
        });
      };

      // Update Summary Totals
      const updateTotals = () => {
        const subtotal = cartItems.reduce((acc, item) => acc + (item.price * item.qty), 0);
        const discount = cartItems.length > 0 ? Math.round(subtotal * DISCOUNT_RATE) : 0;
        const shipping = cartItems.length > 0 ? SHIPPING_COST : 0;
        const total = subtotal + shipping - discount;

        document.getElementById('summ-subtotal').textContent = formatCurrency(subtotal);
        document.getElementById('summ-shipping').textContent = formatCurrency(shipping);
        document.getElementById('summ-discount').textContent = formatCurrency(discount);
        document.getElementById('summ-total').textContent = formatCurrency(total);
      };

      // Initialize Payment Tabs
      const paymentTabs = document.querySelectorAll('.payment-method');
      paymentTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          paymentTabs.forEach(t => t.classList.remove('is-active'));
          tab.classList.add('is-active');
        });
      });

      // Input Formatting
      const cardNumberInput = document.getElementById('card-number');
      cardNumberInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        value = value.replace(/(.{4})/g, '$1 ').trim();
        e.target.value = value;
      });

      const cardExpiryInput = document.getElementById('card-expiry');
      cardExpiryInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length >= 3) {
          value = value.substring(0, 2) + ' / ' + value.substring(2, 4);
        }
        e.target.value = value;
      });

      // Checkout Button
      const checkoutBtn = document.getElementById('btn-checkout');
      checkoutBtn.addEventListener('click', () => {
        if(cartItems.length === 0) {
          alert('Your cart is empty!');
          return;
        }
        
        checkoutBtn.innerHTML = 'Processing...';
        checkoutBtn.disabled = true;
        
        setTimeout(() => {
          alert('Order Placed Successfully!');
          checkoutBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M12 8v4l3 3"></path></svg> Check Out';
          checkoutBtn.disabled = false;
          cartItems = [];
          renderCart();
        }, 1500);
      });

      // Initial Render
      renderCart();
    });
  </script>
</body>
</html>
